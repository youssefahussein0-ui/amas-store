services:
  - type: web
    name: amas-store
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        value: amas-jewel-boutique-s3cr3t-k3y-2026-pr0duct10n
      - key: DATABASE_URL
        fromDatabase:
          name: amas-store-db
          property: connectionString

databases:
  - name: amas-store-db
    databaseName: amas_store
    user: amas_admin
    plan: free
    region: frankfurt
